<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Vendas - Clientes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<aside class="sidebar">
    <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
        <h2>CONTROLE DE VENDAS</h2>
    </div>
    <nav class="menu">
        <a href="index.html">Dashboard</a>
        <a href="entradas.html">Entradas de Estoque</a>
        <a href="saidas.html">Saídas / Vendas</a>
        <a href="Clientes.html" class="active">Clientes</a>
        <a href="fornecedores.html">Fornecedores</a>
    </nav>
    <a href="#" id="btn-logout" class="logout">Sair</a>
</aside>

<main class="main-content">
    <header class="topbar">
        <div class="user-info">
            <span id="nome-usuario-sessao">Olá, Usuário</span>
            <div class="avatar"></div>
        </div>
    </header>

    <section class="page-container">
        <h2 class="page-title">Gerenciamento de Clientes</h2>
        <div class="card">
            <div class="toolbar">
                <div class="search-box">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Buscar cliente...">
                </div>
                <div class="actions-box">
                    <div class="status-filter">
                        <label for="statusSelect">Status:</label>
                        <select id="statusSelect">
                            <option value="Todos">Todos</option>
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="btnNovoCliente">+ Novo Cliente</button>
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>CLIENTE</th>
                            <th>CONTATO</th>
                            <th>TELEFONE</th>
                            <th>E-MAIL</th>
                            <th>STATUS</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="clientesTableBody"></tbody>
                </table>
            </div>
            <div class="pagination-footer">
                <span id="paginationInfo" class="pagination-info">Mostrando 0 de 0 clientes</span>
            </div>
        </div>
    </section>
</main>

<!-- Modal Cadastrar / Editar Cliente -->
<div id="modalCliente" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="tituloModalCliente">Cadastrar Novo Cliente</h2>
            <button id="btnFecharModal" class="close-btn">&times;</button>
        </div>
        <form id="formCliente">
            <input type="hidden" id="clienteId">
            <div class="input-group">
                <label for="nomeCliente">Nome (Empresa/Pessoa)</label>
                <input type="text" id="nomeCliente" placeholder="Ex: Queijaria do Bairro" required>
            </div>
            <div class="input-group">
                <label for="contatoCliente">Pessoa de Contato</label>
                <input type="text" id="contatoCliente" placeholder="Ex: João Silva">
            </div>
            <div style="display:flex;gap:15px;">
                <div class="input-group" style="flex:1;">
                    <label for="telefoneCliente">Telefone</label>
                    <input type="text" id="telefoneCliente" placeholder="(00) 00000-0000">
                </div>
                <div class="input-group" style="flex:1;">
                    <label for="emailCliente">E-mail</label>
                    <input type="email" id="emailCliente" placeholder="contato@email.com">
                </div>
            </div>
            <div class="input-group">
                <label for="statusCliente">Status</label>
                <select id="statusCliente" style="width:100%;padding:10px;border:1px solid var(--border-color);border-radius:4px;background:var(--card-bg);">
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" id="btnCancelarModal" class="btn-secondary">Cancelar</button>
                <button type="submit" class="btn-primary">Salvar Cliente</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Confirmar Exclusão -->
<div id="modalExcluir" class="modal-overlay">
    <div class="modal-content" style="max-width:380px;">
        <div class="modal-header">
            <h2>Confirmar Exclusão</h2>
            <button id="btnFecharExcluir" class="close-btn">&times;</button>
        </div>
        <p id="textoExcluir" style="margin-bottom:20px;">Tem certeza que deseja excluir este cliente?</p>
        <div class="modal-actions">
            <button id="btnCancelarExcluir" class="btn-secondary">Cancelar</button>
            <button id="btnConfirmarExcluir" class="btn-primary" style="background:var(--red-accent);">Excluir</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let todosClientes = [];
    let clienteParaExcluir = null;

    const tabelaCorpo   = document.getElementById('clientesTableBody');
    const searchInput   = document.getElementById('searchInput');
    const statusSelect  = document.getElementById('statusSelect');

    // --- Sessão ---
    async function checarSessao() {
        try {
            const res = await fetch('/api/auth/sessao');
            if (!res.ok) { window.location.href = 'login.html'; return; }
            const d = await res.json();
            document.getElementById('nome-usuario-sessao').innerText = `Olá, ${d.nome}`;
        } catch { window.location.href = 'login.html'; }
    }

    // --- Carregar clientes da API ---
    async function carregarClientes() {
        try {
            const res = await fetch('/api/clientes');
            if (res.ok) {
                todosClientes = await res.json();
                filtrar();
            }
        } catch (err) { console.error("Erro ao buscar clientes:", err); }
    }

    // --- Renderizar tabela ---
    function renderizarTabela(lista) {
        tabelaCorpo.innerHTML = '';
        if (lista.length === 0) {
            tabelaCorpo.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nenhum cliente encontrado.</td></tr>';
            document.getElementById('paginationInfo').innerText = `Mostrando 0 de ${todosClientes.length} clientes`;
            return;
        }
        lista.forEach(c => {
            const tr = document.createElement('tr');
            const statusClass = c.status === 'Ativo' ? 'ativo' : 'inativo';
            tr.innerHTML = `
                <td><strong>${c.nome}</strong></td>
                <td>${c.contato || '-'}</td>
                <td>${c.telefone || '-'}</td>
                <td>${c.email || '-'}</td>
                <td><span class="status-badge ${statusClass}">${c.status}</span></td>
                <td>
                    <div class="action-icons">
                        <button class="action-btn" title="Editar" onclick="editarCliente(${c.id})">✏️</button>
                        <button class="action-btn" title="${c.status === 'Ativo' ? 'Desativar' : 'Ativar'}" onclick="alternarStatus(${c.id})">${c.status === 'Ativo' ? '🔴' : '🟢'}</button>
                        <button class="action-btn" title="Excluir" onclick="excluirCliente(${c.id}, '${c.nome.replace(/'/g,"\\'")}')">🗑️</button>
                    </div>
                </td>`;
            tabelaCorpo.appendChild(tr);
        });
        document.getElementById('paginationInfo').innerText = `Mostrando ${lista.length} de ${todosClientes.length} clientes`;
    }

    // --- Filtrar ---
    function filtrar() {
        const texto  = searchInput.value.toLowerCase();
        const status = statusSelect.value;
        const filtrados = todosClientes.filter(c => {
            const bateTexto  = c.nome.toLowerCase().includes(texto) || (c.email || '').toLowerCase().includes(texto) || (c.telefone || '').includes(texto);
            const bateStatus = status === 'Todos' || c.status === status;
            return bateTexto && bateStatus;
        });
        renderizarTabela(filtrados);
    }
    searchInput.addEventListener('input', filtrar);
    statusSelect.addEventListener('change', filtrar);

    // --- Editar Cliente ---
    window.editarCliente = (id) => {
        const c = todosClientes.find(x => x.id === id);
        if (!c) return;
        document.getElementById('clienteId').value       = c.id;
        document.getElementById('nomeCliente').value     = c.nome;
        document.getElementById('contatoCliente').value  = c.contato || '';
        document.getElementById('telefoneCliente').value = c.telefone || '';
        document.getElementById('emailCliente').value    = c.email || '';
        document.getElementById('statusCliente').value   = c.status;
        document.getElementById('tituloModalCliente').innerText = `Editar: ${c.nome}`;
        document.getElementById('modalCliente').classList.add('active');
    };

    // --- Alternar Ativo/Inativo ---
    window.alternarStatus = async (id) => {
        const c = todosClientes.find(x => x.id === id);
        if (!c) return;
        const novoStatus = c.status === 'Ativo' ? 'Inativo' : 'Ativo';
        try {
            const res = await fetch(`/api/clientes/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...c, status: novoStatus })
            });
            if (res.ok) await carregarClientes();
            else alert('Erro ao alterar status.');
        } catch { alert('Erro de rede.'); }
    };

    // --- Excluir Cliente ---
    window.excluirCliente = (id, nome) => {
        clienteParaExcluir = id;
        document.getElementById('textoExcluir').innerText = `Tem certeza que deseja excluir "${nome}"?`;
        document.getElementById('modalExcluir').classList.add('active');
    };

    document.getElementById('btnConfirmarExcluir').addEventListener('click', async () => {
        if (!clienteParaExcluir) return;
        try {
            const res = await fetch(`/api/clientes/${clienteParaExcluir}`, { method: 'DELETE' });
            if (res.ok) {
                document.getElementById('modalExcluir').classList.remove('active');
                clienteParaExcluir = null;
                await carregarClientes();
            } else { alert('Erro ao excluir cliente.'); }
        } catch { alert('Erro de rede.'); }
    });
    document.getElementById('btnFecharExcluir').addEventListener('click', () => document.getElementById('modalExcluir').classList.remove('active'));
    document.getElementById('btnCancelarExcluir').addEventListener('click', () => document.getElementById('modalExcluir').classList.remove('active'));

    // --- Formulário Salvar ---
    document.getElementById('formCliente').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('clienteId').value;
        const cliente = {
            nome:     document.getElementById('nomeCliente').value,
            contato:  document.getElementById('contatoCliente').value,
            telefone: document.getElementById('telefoneCliente').value,
            email:    document.getElementById('emailCliente').value,
            status:   document.getElementById('statusCliente').value
        };
        try {
            const url    = id ? `/api/clientes/${id}` : '/api/clientes';
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cliente) });
            if (res.ok) {
                document.getElementById('modalCliente').classList.remove('active');
                document.getElementById('formCliente').reset();
                document.getElementById('clienteId').value = '';
                await carregarClientes();
            } else { alert('Erro ao salvar cliente.'); }
        } catch { alert('Erro de rede.'); }
    });

    // --- Modal ---
    document.getElementById('btnNovoCliente').addEventListener('click', () => {
        document.getElementById('formCliente').reset();
        document.getElementById('clienteId').value = '';
        document.getElementById('tituloModalCliente').innerText = 'Cadastrar Novo Cliente';
        document.getElementById('modalCliente').classList.add('active');
    });
    document.getElementById('btnFecharModal').addEventListener('click', () => document.getElementById('modalCliente').classList.remove('active'));
    document.getElementById('btnCancelarModal').addEventListener('click', () => document.getElementById('modalCliente').classList.remove('active'));

    // --- Logout ---
    document.getElementById('btn-logout').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = 'login.html';
    });

    checarSessao();
    carregarClientes();
});
</script>
</body>
</html>
